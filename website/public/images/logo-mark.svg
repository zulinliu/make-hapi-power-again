<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Duck body - simplified geometric silhouette -->
  <ellipse cx="256" cy="320" rx="140" ry="110" fill="#0A0A0B" stroke="#4ADE80" stroke-width="6"/>
  <!-- Duck head -->
  <circle cx="220" cy="190" r="80" fill="#0A0A0B" stroke="#4ADE80" stroke-width="6"/>
  <!-- Neck connector -->
  <path d="M190 260 Q200 300 200 340 Q220 360 260 340 Q250 300 240 260 Z" fill="#0A0A0B" stroke="#4ADE80" stroke-width="4"/>
  <!-- Beak -->
  <path d="M140 175 L100 195 L140 210 Z" fill="#4ADE80" stroke="#4ADE80" stroke-width="2" stroke-linejoin="round"/>
  <!-- Eye -->
  <circle cx="200" cy="175" r="12" fill="#4ADE80"/>
  <circle cx="200" cy="175" r="6" fill="#0A0A0B"/>
  <!-- Electric glow effect on head -->
  <path d="M290 140 L310 100 L300 130 L325 90" stroke="#4ADE80" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  <!-- Circuit pattern on body -->
  <path d="M180 300 L220 300 L220 330 L260 330" stroke="#4ADE80" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
  <path d="M300 290 L330 290 L330 320 L360 320" stroke="#4ADE80" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
  <circle cx="260" cy="330" r="4" fill="#4ADE80" opacity="0.4"/>
  <circle cx="360" cy="320" r="4" fill="#4ADE80" opacity="0.4"/>
  <!-- Wing hint -->
  <path d="M220 290 Q260 260 320 280 Q300 310 260 320 Q240 310 220 290 Z" fill="#0A0A0B" stroke="#4ADE80" stroke-width="3" opacity="0.6"/>
  <!-- Tail -->
  <path d="M396 280 L420 260 L410 290 Z" fill="#4ADE80" opacity="0.7"/>
</svg>
