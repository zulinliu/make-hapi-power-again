<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content"
        />

        <!-- PWA Meta Tags -->
        <meta name="theme-color" content="#ffffff" />
        <meta name="description" content="AI-powered development assistant" />

        <!-- iOS PWA Meta Tags -->
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta name="apple-mobile-web-app-title" content="Hapi Power" />
        <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
        <link rel="apple-touch-icon" sizes="120x120" href="/apple-touch-icon-120x120.png" />
        <link rel="apple-touch-icon" sizes="152x152" href="/apple-touch-icon-152x152.png" />
        <link rel="apple-touch-icon" sizes="167x167" href="/apple-touch-icon-167x167.png" />
        <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon-180x180.png" />

        <!-- iOS Launch Screens (dark variants for dark theme) -->
        <link rel="apple-touch-startup-image" href="/splash-dark-1290x2796.png" media="screen and (device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (prefers-color-scheme: dark)" />
        <link rel="apple-touch-startup-image" href="/splash-light-1290x2796.png" media="screen and (device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (prefers-color-scheme: light)" />
        <link rel="apple-touch-startup-image" href="/splash-dark-1179x2556.png" media="screen and (device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (prefers-color-scheme: dark)" />
        <link rel="apple-touch-startup-image" href="/splash-light-1179x2556.png" media="screen and (device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (prefers-color-scheme: light)" />
        <link rel="apple-touch-startup-image" href="/splash-dark-1284x2778.png" media="screen and (device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3) and (prefers-color-scheme: dark)" />
        <link rel="apple-touch-startup-image" href="/splash-light-1284x2778.png" media="screen and (device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3) and (prefers-color-scheme: light)" />
        <link rel="apple-touch-startup-image" href="/splash-dark-1170x2532.png" media="screen and (device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (prefers-color-scheme: dark)" />
        <link rel="apple-touch-startup-image" href="/splash-light-1170x2532.png" media="screen and (device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (prefers-color-scheme: light)" />
        <link rel="apple-touch-startup-image" href="/splash-dark-1125x2436.png" media="screen and (device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3) and (prefers-color-scheme: dark)" />
        <link rel="apple-touch-startup-image" href="/splash-light-1125x2436.png" media="screen and (device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3) and (prefers-color-scheme: light)" />
        <link rel="apple-touch-startup-image" href="/splash-dark-750x1334.png" media="screen and (device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2) and (prefers-color-scheme: dark)" />
        <link rel="apple-touch-startup-image" href="/splash-light-750x1334.png" media="screen and (device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2) and (prefers-color-scheme: light)" />

        <!-- Favicon -->
        <link rel="icon" href="/favicon.ico" sizes="48x48" />
        <link rel="icon" href="/icon.svg" sizes="any" type="image/svg+xml" />

        <!-- Safari Pinned Tab -->
        <link rel="mask-icon" href="/mask-icon.svg" color="#111827" />

        <script>
            (function () {
                try {
                    var raw = localStorage.getItem('hapi-power-font-scale')
                    var scale = Number(raw)
                    if (scale === 0.8 || scale === 0.9 || scale === 1 || scale === 1.1 || scale === 1.2) {
                        document.documentElement.style.setProperty('--app-font-scale', String(scale))
                    }
                } catch (error) {
                    // Ignore storage errors.
                }
            })()
        </script>
        <script>
            (function () {
                var lightColor = '#ffffff'
                var darkColor = '#1c1c1e'

                function getInitialScheme() {
                    try {
                        var appearance = localStorage.getItem('hapi-power-appearance')
                        if (appearance === 'dark' || appearance === 'light') return appearance
                    } catch (error) {
                        // Ignore storage errors.
                    }

                    return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
                        ? 'dark'
                        : 'light'
                }

                var scheme = getInitialScheme()
                var color = scheme === 'dark' ? darkColor : lightColor
                document.documentElement.setAttribute('data-theme', scheme)
                document.querySelector('meta[name="theme-color"]').setAttribute('content', color)
            })()
        </script>
        <!-- Prevent flash of mismatched background on app launch -->
        <style>
            html { background: #fff }
            html[data-theme="dark"] { background: #1c1c1e; color-scheme: dark }
        </style>

        <title>Hapi Power</title>
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
