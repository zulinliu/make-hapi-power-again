<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Hapi Power — Offline</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex; align-items: center; justify-content: center;
            background: #1c1c1e; color: #e5e5e7;
        }
        @media (prefers-color-scheme: light) {
            body { background: #ffffff; color: #1c1c1e; }
        }
        .offline { text-align: center; padding: 2rem; }
        .offline h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.5rem; }
        .offline p { font-size: 0.875rem; opacity: 0.6; margin-bottom: 1.5rem; }
        .offline button {
            padding: 0.5rem 1.25rem; border-radius: 0.5rem; border: none;
            background: #0a84ff; color: white; font-size: 0.875rem;
            cursor: pointer; -webkit-tap-highlight-color: transparent;
        }
        .offline button:active { opacity: 0.8; }
    </style>
</head>
<body>
    <div class="offline">
        <h1>You're offline</h1>
        <p>Check your internet connection and try again.</p>
        <button onclick="location.reload()">Retry</button>
    </div>
</body>
</html>
