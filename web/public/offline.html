<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Hapi Power — Offline</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex; align-items: center; justify-content: center;
            background: #1c1c1e; color: #e5e5e7;
        }
        @media (prefers-color-scheme: light) {
            body { background: #ffffff; color: #1c1c1e; }
        }
        .offline { text-align: center; padding: 2rem; }
        .offline h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.5rem; }
        .offline p { font-size: 0.875rem; opacity: 0.6; margin-bottom: 1.5rem; }
        .offline button {
            padding: 0.5rem 1.25rem; border-radius: 0.5rem; border: none;
            background: #F97316; color: white; font-size: 0.875rem;
            cursor: pointer; -webkit-tap-highlight-color: transparent;
        }
        .offline button:active { opacity: 0.8; }
    </style>
    <script>
        (function() {
            var lang = (navigator.language || 'en').toLowerCase();
            var isZh = lang.startsWith('zh');
            var title = isZh ? 'Hapi Power — 离线' : 'Hapi Power — Offline';
            var h1 = isZh ? '当前处于离线状态' : "You're offline";
            var p = isZh ? '请检查网络连接后重试。' : 'Check your internet connection and try again.';
            var btn = isZh ? '重试' : 'Retry';
            document.title = title;
            document.documentElement.lang = isZh ? 'zh-CN' : 'en';
            document.getElementById('h1').textContent = h1;
            document.getElementById('p').textContent = p;
            document.getElementById('btn').textContent = btn;
        })();
    </script>
</head>
<body>
    <div class="offline">
        <h1 id="h1"></h1>
        <p id="p"></p>
        <button id="btn" onclick="location.reload()"></button>
    </div>
</body>
</html>
