name: Test

on:
    workflow_dispatch:

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.3.14
            - run: bun install
            - run: bun typecheck
            - name: Create integration test env
              run: |
                  {
                      echo "HAPI_POWER_HOME=~/.hapi-power-dev-test"
                      echo "HAPI_POWER_API_URL=http://localhost:3006"
                      echo "CLI_API_TOKEN=${CLI_API_TOKEN:-dev-test-token}"
                      echo "HAPI_POWER_DAEMON_HTTP_TIMEOUT=60000"
                      echo "HAPI_POWER_DAEMON_HEARTBEAT_INTERVAL=30000"
                  } > cli/.env.integration-test
            - run: bun run test
